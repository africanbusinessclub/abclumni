server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy uploaded files (event cover images, etc.) to the backend
    # ^~ ensures this takes priority over the static-assets regex below
    location ^~ /uploads/ {
        proxy_pass http://backend:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service worker and manifest must not be cached so updates are picked up immediately
    location ~* (sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Serve static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router: fall back to index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
